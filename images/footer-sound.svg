<svg width="25" height="24" viewBox="0 0 25 24" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
.wave{
  stroke:#8a8a8a;
  stroke-width:.5;
  stroke-linecap:round;
  fill:none;
}
.l1{animation:w1 3s ease-in-out infinite;}
.l2{animation:w2 3s ease-in-out infinite;}
.l3{animation:w3 3s ease-in-out infinite;}
.l4{animation:w4 3s ease-in-out infinite;}

@keyframes w1{
0%,100%{d:path("M0 4 Q6 1 12 4 T24 4");}
50%{d:path("M0 4 Q6 8 12 4 T24 4");}
}
@keyframes w2{
0%,100%{d:path("M0 8 Q6 4 12 8 T24 8");}
50%{d:path("M0 8 Q6 12 12 8 T24 8");}
}
@keyframes w3{
0%,100%{d:path("M0 13 Q6 9 12 13 T24 13");}
50%{d:path("M0 13 Q6 17 12 13 T24 13");}
}
@keyframes w4{
0%,100%{d:path("M0 18 Q6 14 12 18 T24 18");}
50%{d:path("M0 18 Q6 22 12 18 T24 18");}
}

.note{
transform-origin:center;
animation:float 2.5s ease-in-out infinite;
}
.noteWrap{transform-origin:12px 12px;animation:pulse 2.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(0.50);}50%{transform:scale(0.70);}}
@keyframes float{
50%{transform:translateY(-1px);}
}
</style>

<path class="wave l1" d="M0 4 Q6 1 12 4 T24 4"/>
<path class="wave l2" d="M0 8 Q6 4 12 8 T24 8"/>
<path class="wave l3" d="M0 13 Q6 9 12 13 T24 13"/>
<path class="wave l4" d="M0 18 Q6 14 12 18 T24 18"/>

<g class="noteWrap" transform="translate(3.15 2.65) scale(0.76)">
